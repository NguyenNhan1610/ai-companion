tasks:
  # ═══════════════════════════════════════════════
  # Track A: Core Proxy (Foundational)
  # ═══════════════════════════════════════════════

  - id: T01
    title: Proxy HTTP server core
    status: done
    priority: P0
    track: core-proxy
    description: |
      Create proxy-server.mjs as Node.js port of ccproxycache/reverse-proxy/main.py.
      node:http.createServer() bound to 127.0.0.1. Handle GET /health, OPTIONS (CORS),
      POST /v1/* passthrough. Zero-overhead stream piping: req.pipe(upstreamReq) +
      upstreamRes.pipe(clientRes). REST endpoints: GET /api/logs, /api/logs/dates,
      /api/logs/stream (SSE fan-out, max 5 clients). Env vars: PROXY_PORT (3001),
      ANTHROPIC_FORWARD_URL, PROXY_LOG_DIR.
    references:
      impl: IMPL-05 A1
      fac: [FAC-01, FAC-08, FAC-10, FAC-13, FAC-15, FAC-16]
    dependencies: []
    blocks: [T02, T03, T04]
    files:
      - plugins/ai/scripts/proxy-server.mjs
    effort: 3d

  - id: T02
    title: JSONL logging with security header stripping
    status: done
    priority: P0
    track: core-proxy
    description: |
      Add daily-rotated JSONL logging to proxy-server.mjs. Log to
      .claude/proxy-logs/YYYY-MM-DD.jsonl with permissions 0o600 (dir 0o700).
      Strip x-api-key, authorization, cookie, proxy-authorization from logged headers.
      Async fs.appendFile() after stream end -- never block relay path.
      Truncate request body to 100KB with [truncated] marker.
    references:
      impl: IMPL-05 A2
      fac: [FAC-02, FAC-03, FAC-17]
    dependencies: [T01]
    blocks: [T07, T08, T13, T14]
    files:
      - plugins/ai/scripts/proxy-server.mjs
    effort: 1d

  - id: T03
    title: SSE stream relay and usage parsing
    status: done
    priority: P1
    track: core-proxy
    description: |
      Implement SSE-aware streaming relay in proxy-server.mjs.
      upstreamRes.pipe(clientRes) relays at wire speed; passive data listener
      taps chunks for usage extraction. Parse SSE data lines for token usage
      from message_start, message_delta, content_block_delta events.
      Handle partial SSE lines with line buffer. try/catch per chunk parse.
      600s upstream timeout.
    references:
      impl: IMPL-05 A3
      fac: [FAC-13, FAC-15, FAC-16, FAC-18]
    dependencies: [T01]
    blocks: []
    files:
      - plugins/ai/scripts/proxy-server.mjs
    effort: 2d

  # ═══════════════════════════════════════════════
  # Track B: Lifecycle Management
  # ═══════════════════════════════════════════════

  - id: T04
    title: Proxy lifecycle module
    status: done
    priority: P0
    track: lifecycle
    description: |
      Create proxy-lifecycle.mjs following broker-lifecycle.mjs pattern.
      Exports: startProxy(cwd, options), stopProxy(cwd), isProxyRunning(cwd),
      saveProxySession/loadProxySession/clearProxySession. Spawn proxy-server.mjs
      as detached child, write pid/port files, poll /health every 50ms (max 2s).
      Handle stale pid files.
    references:
      impl: IMPL-05 B1
    dependencies: [T01]
    blocks: [T05, T06, T07]
    files:
      - plugins/ai/scripts/lib/proxy-lifecycle.mjs
    effort: 2d

  - id: T05
    title: Session hook integration
    status: done
    priority: P0
    track: lifecycle
    description: |
      Modify session-lifecycle-hook.mjs to integrate proxy lifecycle.
      handleSessionStart(): if proxy session exists and alive, inject
      ANTHROPIC_BASE_URL=http://localhost:{port} via appendEnvVar().
      Guard: skip if ANTHROPIC_BASE_URL already set to non-localhost URL.
      handleSessionEnd(): call stopProxy(cwd).
    references:
      impl: IMPL-05 B2
      fac: [FAC-05, FAC-07]
    dependencies: [T04]
    blocks: [T10]
    files:
      - plugins/ai/scripts/session-lifecycle-hook.mjs
    effort: 1d

  - id: T06
    title: Port conflict auto-scan
    status: done
    priority: P1
    track: lifecycle
    description: |
      Enhance startProxy() in proxy-lifecycle.mjs to handle port conflicts.
      Try port 3001; if EADDRINUSE, scan 3002-3010. Use net.createServer().listen(port)
      test. Report chosen port in session state.
    references:
      impl: IMPL-05 B3
      fac: [FAC-11]
    dependencies: [T04]
    blocks: []
    files:
      - plugins/ai/scripts/lib/proxy-lifecycle.mjs
    effort: 1d

  - id: T07
    title: Health monitoring and auto-restart
    status: done
    priority: P1
    track: lifecycle
    description: |
      Add ensureProxyHealthy(cwd) to proxy-lifecycle.mjs. Check /health endpoint.
      If down, attempt 1 restart via stopProxy() + startProxy(). If restart fails,
      log warning and clear proxy session. Called from handleSessionStart().
      Document CLAUDE_ENV_FILE append-only limitation.
    references:
      impl: IMPL-05 B4
    dependencies: [T04]
    blocks: [T10]
    files:
      - plugins/ai/scripts/lib/proxy-lifecycle.mjs
    effort: 1d

  # ═══════════════════════════════════════════════
