  # ═══════════════════════════════════════════════

  - id: T08
    title: Stats computation module
    status: done
    priority: P0
    track: stats
    description: |
      Create proxy-stats.mjs with computeStats(logDir, options). Reads JSONL logs,
      computes cache hit rate, quota burn rate (5h/7d windows), cache create/read
      breakdown, per-session cost estimate. Exports in-memory accumulator class.
      Atomic file output (tmp + rename) to resolveStateDir(cwd)/proxy-stats.json.
    references:
      impl: IMPL-05 C1
    dependencies: [T02]
    blocks: [T09]
    files:
      - plugins/ai/scripts/lib/proxy-stats.mjs
    effort: 2d

  - id: T09
    title: Stats file writer integration in proxy server
    status: done
    priority: P0
    track: stats
    description: |
      Integrate stats accumulator from proxy-stats.mjs into proxy-server.mjs.
      Update in-memory stats after each request. Sync to proxy-stats.json on
      5-second setInterval. Include all schema fields: proxyPort, upSince,
      totalRequests, totalErrors, cacheHitRate, cacheSummary, quotaBurn,
      lastRequest, updatedAt.
    references:
      impl: IMPL-05 C2
    dependencies: [T08]
    blocks: [T11]
    files:
      - plugins/ai/scripts/proxy-server.mjs
    effort: 1d

